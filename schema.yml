components:
  schemas:
    BookRequest:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/RapidoUser'
        pickup_location:
          $ref: '#/components/schemas/Location'
        drop_location:
          $ref: '#/components/schemas/Location'
        service_type:
          $ref: '#/components/schemas/ServiceTypeEnum'
      required:
      - drop_location
      - pickup_location
      - service_type
      - user
    CancelRequest:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        cancelReason:
          type: string
          maxLength: 255
      required:
      - cancelReason
      - orderId
    EstimateRequest:
      type: object
      properties:
        pickup_location:
          $ref: '#/components/schemas/Location'
        drop_location:
          $ref: '#/components/schemas/Location'
        service_type:
          $ref: '#/components/schemas/ServiceTypeEnum'
      required:
      - drop_location
      - pickup_location
      - service_type
    FareBreakup:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        basic:
          type: number
          format: double
          minimum: 0
        toll:
          type: number
          format: double
          minimum: 0
        convenience_charge:
          type: number
          format: double
          minimum: 0
        convenience_charge_tax:
          type: number
          format: double
          minimum: 0
          description: Please enter calculated value.
        discount:
          type: number
          format: double
          minimum: 0
        add_on:
          type: number
          format: double
          minimum: 0
        add_on_tax:
          type: number
          format: double
          minimum: 0
          description: Please enter calculated value.
        cancellation_chg:
          type: number
          format: double
          minimum: 0
        franchisee_service_charge:
          type: number
          format: double
          minimum: 0
        amount:
          type: number
          format: double
          minimum: 0
      required:
      - amount
      - id
    Location:
      type: object
      properties:
        lat:
          type: number
          format: double
          nullable: true
        lng:
          type: number
          format: double
          nullable: true
      required:
      - lat
      - lng
    PatchedTicket:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        pnr:
          type: string
          readOnly: true
        ticket_type:
          allOf:
          - $ref: '#/components/schemas/TicketType'
          readOnly: true
        status:
          type: integer
          readOnly: true
        fare:
          allOf:
          - $ref: '#/components/schemas/FareBreakup'
          readOnly: true
        start_location_name:
          type: string
          readOnly: true
          nullable: true
        start_location_lat:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          readOnly: true
          nullable: true
        start_location_lng:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          readOnly: true
          nullable: true
        end_location_name:
          type: string
          readOnly: true
          nullable: true
        end_location_lat:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          readOnly: true
          nullable: true
        end_location_lng:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          readOnly: true
          nullable: true
        transit_mode:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    PatchedTransaction:
      type: object
      properties:
        gateway_order_id:
          type: string
          maxLength: 30
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        status:
          $ref: '#/components/schemas/TransactionStatus'
        amount:
          type: number
          format: double
        type:
          $ref: '#/components/schemas/TypeEnum'
        gateway_transaction_id:
          type: string
          nullable: true
          maxLength: 63
        gateway_transaction_status:
          $ref: '#/components/schemas/TransactionStatus'
        user:
          type: integer
        gateway_mode:
          type: integer
          nullable: true
    PatchedTransitOption:
      type: object
      properties:
        transit_mode:
          type: string
        provider:
          $ref: '#/components/schemas/TransitProvider'
    PatchedTransitProvider:
      type: object
      properties:
        name:
          type: string
          description: Name of the transit agency or service, like Uber, MTA, Rapido,
            American Airlines etc. Accepts only alphanumeric characters and spaces
          pattern: ^[0-9a-zA-Z\-_ ]*$
          maxLength: 255
    PatchedTrip:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        status:
          type: string
          readOnly: true
        transit_mode:
          type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        start_location_name:
          type: string
          nullable: true
          maxLength: 255
        start_location_lat:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        start_location_lng:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        end_location_name:
          type: string
          nullable: true
          maxLength: 255
        end_location_lat:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        end_location_lng:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        scheduled_start_datetime:
          type: string
          format: date-time
        scheduled_end_datetime:
          type: string
          format: date-time
        actual_start_datetime:
          type: string
          format: date-time
          nullable: true
        actual_end_datetime:
          type: string
          format: date-time
          nullable: true
        duration:
          type: integer
          nullable: true
        distance:
          type: integer
          nullable: true
        fare:
          type: number
          format: double
          nullable: true
        user:
          type: integer
          nullable: true
        parent:
          type: integer
          nullable: true
        transit_option:
          type: integer
          nullable: true
    PatchedUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          nullable: true
          maxLength: 255
        phone_number:
          type: string
          nullable: true
          pattern: ^[5-9]\d{9}$
          maxLength: 10
    RapidoUser:
      type: object
      properties:
        mobile:
          type: string
          maxLength: 10
      required:
      - mobile
    ServiceTypeEnum:
      enum:
      - biketaxi
      - auto
      type: string
      description: |-
        * `biketaxi` - biketaxi
        * `auto` - auto
    Ticket:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        pnr:
          type: string
          readOnly: true
        ticket_type:
          allOf:
          - $ref: '#/components/schemas/TicketType'
          readOnly: true
        status:
          type: integer
          readOnly: true
        fare:
          allOf:
          - $ref: '#/components/schemas/FareBreakup'
          readOnly: true
        start_location_name:
          type: string
          readOnly: true
          nullable: true
        start_location_lat:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          readOnly: true
          nullable: true
        start_location_lng:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          readOnly: true
          nullable: true
        end_location_name:
          type: string
          readOnly: true
          nullable: true
        end_location_lat:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          readOnly: true
          nullable: true
        end_location_lng:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          readOnly: true
          nullable: true
        transit_mode:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - end_location_lat
      - end_location_lng
      - end_location_name
      - fare
      - id
      - pnr
      - start_location_lat
      - start_location_lng
      - start_location_name
      - status
      - ticket_type
      - transit_mode
      - updated_at
    TicketType:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        discount_percentage:
          type: number
          format: double
          readOnly: true
        is_description_required:
          type: boolean
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        description:
          type: string
          readOnly: true
          nullable: true
      required:
      - description
      - discount_percentage
      - id
      - is_active
      - is_description_required
      - name
    Transaction:
      type: object
      properties:
        gateway_order_id:
          type: string
          maxLength: 30
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        status:
          $ref: '#/components/schemas/TransactionStatus'
        amount:
          type: number
          format: double
        type:
          $ref: '#/components/schemas/TypeEnum'
        gateway_transaction_id:
          type: string
          nullable: true
          maxLength: 63
        gateway_transaction_status:
          $ref: '#/components/schemas/TransactionStatus'
        user:
          type: integer
        gateway_mode:
          type: integer
          nullable: true
      required:
      - amount
      - created_at
      - gateway_order_id
      - updated_at
      - user
    TransactionStatus:
      enum:
      - P
      - F
      - S
      type: string
      description: |-
        * `P` - Pending
        * `F` - Failed
        * `S` - Success
    TransitOption:
      type: object
      properties:
        transit_mode:
          type: string
        provider:
          $ref: '#/components/schemas/TransitProvider'
      required:
      - provider
      - transit_mode
    TransitProvider:
      type: object
      properties:
        name:
          type: string
          description: Name of the transit agency or service, like Uber, MTA, Rapido,
            American Airlines etc. Accepts only alphanumeric characters and spaces
          pattern: ^[0-9a-zA-Z\-_ ]*$
          maxLength: 255
      required:
      - name
    Trip:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        status:
          type: string
          readOnly: true
        transit_mode:
          type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        start_location_name:
          type: string
          nullable: true
          maxLength: 255
        start_location_lat:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        start_location_lng:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        end_location_name:
          type: string
          nullable: true
          maxLength: 255
        end_location_lat:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        end_location_lng:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,6})?$
          nullable: true
        scheduled_start_datetime:
          type: string
          format: date-time
        scheduled_end_datetime:
          type: string
          format: date-time
        actual_start_datetime:
          type: string
          format: date-time
          nullable: true
        actual_end_datetime:
          type: string
          format: date-time
          nullable: true
        duration:
          type: integer
          nullable: true
        distance:
          type: integer
          nullable: true
        fare:
          type: number
          format: double
          nullable: true
        user:
          type: integer
          nullable: true
        parent:
          type: integer
          nullable: true
        transit_option:
          type: integer
          nullable: true
      required:
      - created_at
      - id
      - status
      - transit_mode
      - updated_at
    TypeEnum:
      enum:
      - 1
      - 3
      - 5
      type: integer
      description: |-
        * `1` - Ticket
        * `3` - Refund
        * `5` - Top-Up
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          nullable: true
          maxLength: 255
        phone_number:
          type: string
          nullable: true
          pattern: ^[5-9]\d{9}$
          maxLength: 10
      required:
      - created_at
      - id
      - updated_at
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid